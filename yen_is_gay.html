<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廢熱利用系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Glassmorphism panel styling */
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5);
        }

        /* Toggle Switch Styling */
        .season-toggle {
            display: flex;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 999px;
            padding: 4px;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 1rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2;
        }
        .toggle-btn.active-summer, .toggle-btn.active-winter { color: #fff; }
        .toggle-slider {
            position: absolute;
            top: 4px; left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            border-radius: 999px;
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            z-index: 1;
        }
        .slider-summer { background: linear-gradient(135deg, #ef4444, #f97316); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.5); transform: translateX(0); }
        .slider-winter { background: linear-gradient(135deg, #3b82f6, #06b6d4); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5); transform: translateX(100%); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        
        <header class="absolute top-6 left-0 w-full flex flex-col items-center gap-3 pointer-events-none z-20">
            <div class="glass-panel rounded-full px-6 py-2.5 flex items-center gap-6 pointer-events-auto border-t-2 border-white/20">
                <h1 class="text-xl font-bold text-white tracking-wide m-0">廢熱利用系統</h1>
                
                <div class="season-toggle w-56">
                    <div id="toggle-slider" class="toggle-slider slider-summer"></div>
                    <div onclick="setSeason('summer')" id="btn-summer" class="toggle-btn active-summer">☀️ 夏季</div>
                    <div onclick="setSeason('winter')" id="btn-winter" class="toggle-btn">❄️ 冬季</div>
                </div>
            </div>
            
            <div class="flex justify-center gap-5 text-xs font-medium text-gray-300 glass-panel px-4 py-1.5 rounded-full pointer-events-auto">
                <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></span> 潛熱傳輸 (高溫)</span>
                <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></span> 循環水回流 (低溫)</span>
            </div>
        </header>

        <div class="absolute bottom-8 left-0 w-full px-8 flex justify-between items-end max-w-7xl mx-auto left-1/2 transform -translate-x-1/2 gap-8 pointer-events-none">
            
            <div class="glass-panel rounded-2xl p-5 pointer-events-auto w-80 flex flex-col items-center justify-center gap-4 border-l-4" id="nav-panel">
                <div class="text-gray-400 text-xs font-semibold tracking-wider">系統架構解析</div>
                <div class="flex items-center justify-between w-full gap-2">
                    <button onclick="prevView()" class="p-1.5 rounded-full hover:bg-white/10 transition-colors text-white focus:outline-none shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <div id="current-view-name" class="text-lg font-bold text-white text-center leading-tight">全局視角</div>
                    <button onclick="nextView()" class="p-1.5 rounded-full hover:bg-white/10 transition-colors text-white focus:outline-none shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>
                <div class="flex gap-2 mt-1" id="pagination-dots">
                    <div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                    <div class="w-2 h-2 rounded-full bg-gray-600"></div>
                    <div class="w-2 h-2 rounded-full bg-gray-600"></div>
                    <div class="w-2 h-2 rounded-full bg-gray-600"></div>
                    <div class="w-2 h-2 rounded-full bg-gray-600"></div>
                </div>
            </div>

            <div id="info-panel" class="glass-panel rounded-2xl p-6 pointer-events-auto flex-1 max-w-xl transition-all duration-300 flex flex-col justify-center min-h-[160px]">
                <p id="info-desc" class="text-gray-200 text-base md:text-[17px] leading-relaxed m-0">
                    載入中...
                </p>
                <div id="info-tags" class="mt-4 flex gap-2 flex-wrap"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Scene, Camera, Renderer Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0f172a');
        scene.fog = new THREE.FogExp2('#0f172a', 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- 2. Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const interiorLight = new THREE.PointLight(0x3b82f6, 1.5, 15);
        interiorLight.position.set(0, 3, 0);
        scene.add(interiorLight);

        const tankLight = new THREE.PointLight(0x3b82f6, 1.5, 15);
        tankLight.position.set(0, -4, 0);
        scene.add(tankLight);

        // --- 3. 3D Model Construction ---
        const materials = {
            houseWall: new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.9 }),
            houseInterior: new THREE.MeshStandardMaterial({ color: 0xbfdbfe, roughness: 0.8, side: THREE.BackSide }),
            roof: new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.9 }),
            ground: new THREE.MeshStandardMaterial({ color: 0x292524, transparent: true, opacity: 0.9, roughness: 1 }),
            pipeHot: new THREE.MeshStandardMaterial({ color: 0xef4444, metalness: 0.5, roughness: 0.2 }),
            pipeCold: new THREE.MeshStandardMaterial({ color: 0x3b82f6, metalness: 0.5, roughness: 0.2 }),
            tankShell: new THREE.MeshPhysicalMaterial({ color: 0xeab308, transparent: true, opacity: 0.3, roughness: 0.2, metalness: 0.1 }), // PCM Honeycomb outer
            tankCore: new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x1e3a8a, emissiveIntensity: 0.5 }),
            deviceWhite: new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.3, metalness: 0.2 }),
            deviceGray: new THREE.MeshStandardMaterial({ color: 0x64748b, roughness: 0.5, metalness: 0.5 }),
            fanBlack: new THREE.MeshStandardMaterial({ color: 0x0f172a })
        };

        const systemGroup = new THREE.Group();
        scene.add(systemGroup);

        const ground = new THREE.Mesh(new THREE.BoxGeometry(40, 8, 20), materials.ground);
        ground.position.set(0, -4, 0);
        ground.receiveShadow = true;
        systemGroup.add(ground);

        const grid = new THREE.GridHelper(40, 40, 0x3b82f6, 0x475569);
        grid.position.y = 0.01;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        systemGroup.add(grid);

        // House
        const houseGroup = new THREE.Group();
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(14, 7, 0.5), materials.houseWall);
        backWall.position.set(0, 3.5, -3.25);
        backWall.receiveShadow = true;
        houseGroup.add(backWall);

        const interiorWall = new THREE.Mesh(new THREE.BoxGeometry(13.6, 6.6, 5.4), materials.houseInterior);
        interiorWall.position.set(0, 3.4, -0.2); 
        houseGroup.add(interiorWall);

        const divider = new THREE.Mesh(new THREE.BoxGeometry(0.2, 7, 6), materials.houseWall);
        divider.position.set(0, 3.5, -0.25);
        houseGroup.add(divider);

        const roofGeo = new THREE.ConeGeometry(Math.SQRT1_2, 1, 4);
        roofGeo.rotateY(Math.PI / 4);
        roofGeo.scale(15, 3, 8);
        const roof = new THREE.Mesh(roofGeo, materials.roof);
        roof.position.set(0, 8.5, 0);
        roof.castShadow = true;
        houseGroup.add(roof);
        systemGroup.add(houseGroup);

        // C. Left: Energy Capture (Water-Cooled AC Node)
        function createAC() {
            const grp = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.6, 1), materials.deviceWhite);
            body.castShadow = true;
            const fanGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.05, 32);
            const fan = new THREE.Mesh(fanGeo, materials.fanBlack);
            fan.rotation.x = Math.PI/2;
            fan.position.set(0.4, 0, 0); 
            const vent = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 1.05), materials.deviceGray);
            vent.position.set(-0.6, 0, 0);
            grp.add(body, fan, vent);
            return grp;
        }

        const leftSystem = new THREE.Group();
        const acLeft = createAC();
        acLeft.position.set(-8.5, 2, 0);
        leftSystem.add(acLeft);

        const exPoints = [];
        for(let i=0; i<5; i++) {
            exPoints.push(new THREE.Vector3(-10.5 + i*0.4, 0, 0));
            exPoints.push(new THREE.Vector3(-10.5 + i*0.4, 2, 0));
            if(i<4) {
                exPoints.push(new THREE.Vector3(-10.3 + i*0.4, 2, 0));
                exPoints.push(new THREE.Vector3(-10.3 + i*0.4, 0, 0));
            }
        }
        const exPipe = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(exPoints), 100, 0.08, 8, false), materials.pipeHot);
        leftSystem.add(exPipe);
        systemGroup.add(leftSystem);


        // D. Right: Smart Heat Release (Heat Pump + AI Node)
        function createHeater() {
            const grp = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.8, 1.4), materials.deviceWhite);
            body.castShadow = true;
            body.position.y = 0.5; 
            
            // AI Logic Controller Panel
            const panel = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.4), new THREE.MeshBasicMaterial({color: 0x111111}));
            panel.position.set(0, 1.4, 0.71);
            const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.15), new THREE.MeshBasicMaterial({color: 0x10b981})); // Green AI active
            screen.position.set(0, 1.4, 0.72);
            grp.add(body, panel, screen);
            return grp;
        }

        const rightSystem = new THREE.Group();
        const hpRight = createHeater();
        hpRight.position.set(8.5, 1.5, 0);
        rightSystem.add(hpRight);

        const waterHeater = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 2.5), materials.deviceWhite);
        waterHeater.position.set(4, 2, 0);
        waterHeater.castShadow = true;
        rightSystem.add(waterHeater);

        const fhPoints = [];
        for(let i=0; i<4; i++) {
            fhPoints.push(new THREE.Vector3(1, 0.2, -1.5 + i*0.8));
            fhPoints.push(new THREE.Vector3(6, 0.2, -1.5 + i*0.8));
            if(i<3) {
                fhPoints.push(new THREE.Vector3(6, 0.2, -1.1 + i*0.8));
                fhPoints.push(new THREE.Vector3(1, 0.2, -1.1 + i*0.8));
            }
        }
        const fhPipe = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(fhPoints), 100, 0.06, 8, false), materials.pipeHot);
        rightSystem.add(fhPipe);
        systemGroup.add(rightSystem);

        // E. Storage: PCM Storage Bank (Honeycomb represented by tank core)
        const tankGroup = new THREE.Group();
        const tankOuter = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 10, 32), materials.tankShell);
        tankOuter.rotation.z = Math.PI / 2;
        tankGroup.add(tankOuter);

        const tankInner = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.8, 9.6, 32), materials.tankCore);
        tankInner.rotation.z = Math.PI / 2;
        tankGroup.add(tankInner);

        tankGroup.position.set(0, -4, 0);
        systemGroup.add(tankGroup);

        // F. Transport Pipes
        function createTube(points, material) {
            const curve = new THREE.CatmullRomCurve3(points);
            const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, 30, 0.12, 8, false), material);
            return { mesh: tube, curve: curve };
        }

        const flowPathsSummer = [];
        const flowPathsWinter = [];

        const pSL_hot = [ new THREE.Vector3(-9, 0, 0), new THREE.Vector3(-9, -4, 0), new THREE.Vector3(-5, -4, 0) ]; 
        const pSL_cold = [ new THREE.Vector3(-5, -4, 1), new THREE.Vector3(-7.5, -4, 1), new THREE.Vector3(-7.5, 2, 1) ]; 
        const pipeS1 = createTube(pSL_hot, materials.pipeHot);
        const pipeS2 = createTube(pSL_cold, materials.pipeCold);
        leftSystem.add(pipeS1.mesh, pipeS2.mesh);
        
        flowPathsSummer.push({ curve: pipeS1.curve, color: 0xff4444, dir: 1 });
        flowPathsSummer.push({ curve: pipeS2.curve, color: 0x4444ff, dir: 1 });

        const pWR_hot = [ new THREE.Vector3(5, -4, 0), new THREE.Vector3(7.5, -4, 0), new THREE.Vector3(7.5, 1.5, 0) ]; 
        const pWR_cold = [ new THREE.Vector3(8.5, 1.5, 1), new THREE.Vector3(8.5, -4, 1), new THREE.Vector3(5, -4, 1) ]; 
        const pW_indoorHot = [ new THREE.Vector3(7.5, 1.5, -0.5), new THREE.Vector3(4.5, 2, -0.5) ]; 

        const pipeW1 = createTube(pWR_hot, materials.pipeHot);
        const pipeW2 = createTube(pWR_cold, materials.pipeCold);
        const pipeW3 = createTube(pW_indoorHot, materials.pipeHot);
        rightSystem.add(pipeW1.mesh, pipeW2.mesh, pipeW3.mesh);

        flowPathsWinter.push({ curve: pipeW1.curve, color: 0xff8800, dir: 1 });
        flowPathsWinter.push({ curve: pipeW2.curve, color: 0x4444ff, dir: 1 });
        flowPathsWinter.push({ curve: pipeW3.curve, color: 0xff8800, dir: 1 });


        // Particles
        const particlesSummer = [];
        const particlesWinter = [];
        const particleGeo = new THREE.SphereGeometry(0.25, 8, 8);
        
        function initParticles(paths, particleArray) {
            paths.forEach((path) => {
                const mat = new THREE.MeshBasicMaterial({ color: path.color });
                for(let i=0; i<3; i++) {
                    const mesh = new THREE.Mesh(particleGeo, mat);
                    mesh.visible = false;
                    systemGroup.add(mesh);
                    particleArray.push({ mesh: mesh, curve: path.curve, progress: i * 0.33, speed: 0.005 * path.dir });
                }
            });
        }
        initParticles(flowPathsSummer, particlesSummer);
        initParticles(flowPathsWinter, particlesWinter);

        // --- 4. Updated Text Data (Based on Thermal Link Concept) ---
        let currentSeason = 'summer';

        const textData = {
            summer: [
                {
                    title: "微型熱網節點：冷熱互補原理 (夏)",
                    desc: "夏季時，將家戶原本要排向街道的空調廢熱攔截，透過智慧節點轉移並儲存至地底。",
                    tags: ["熱能調度", "熱力學第二定律", "減少熱島效應"]
                },
                {
                    title: "1. 能量捕捉層：熱交換聯網",
                    desc: "改變目前家戶獨立排熱的現況。空調室外機不再直接吹向大街，而是連接到「水冷式熱回收管網」。冷媒排出的高溫熱量直接被循環水帶走。",
                    tags: ["水冷式回收", "COP效率提升", "阻斷廢熱"]
                },
                {
                    title: "熱網管線：向下傳輸",
                    desc: "透過聯網管線，帶有空調廢熱的高溫水（紅）被集中送往地底；而釋放完熱量的低溫冷卻水（藍）則重新循環回流至各戶室外機。",
                    tags: ["水冷管網", "集中傳輸"]
                },
                {
                    title: "2. 儲能轉化層：PCM 儲能池",
                    desc: "儲存裝置，等等介紹。",
                    tags: ["相變材料 PCM", "固態變液態", "潛熱儲存"]
                },
                {
                    title: "3. 智慧決策層：動態分配 (夏)",
                    desc: "在夏季，AI 可將多餘的空調廢熱直接導向正在洗澡的 B 戶進行熱水預熱，或將其存入地底，此時冬季供暖設備處於待機。",
                    tags: ["AI 演算法", "生活熱水預熱", "動態平衡"]
                }
            ],
            winter: [
                {
                    title: "微型熱網節點：跨季取熱原理 (冬)",
                    desc: "冬季需要大量熱能時，系統將夏季存入地底的「廢熱資產」重新提取。透過冷熱互補，大幅降低冬季對電網取暖的依賴。",
                    tags: ["跨季儲能", "降低電網負荷", "永續城市"]
                },
                {
                    title: "1. 能量捕捉層：冬季待機",
                    desc: "冬季不需開啟冷氣製冷，因此左側的空調主機與水冷式熱回收管網進入休眠待機狀態，將運作核心轉移至地底與供暖端。",
                    tags: ["系統休眠", "節能待機"]
                },
                {
                    title: "熱網管線：向上提取",
                    desc: "右側管網啟動。橘色管線將地底釋放的溫水向上抽取至熱泵；降溫後的水（藍）再送回地底吸收潛熱，形成冬季取熱循環。",
                    tags: ["提取熱能", "冬季取熱循環"]
                },
                {
                    title: "2. 儲能轉化層：PCM 凝固放熱",
                    desc: "儲存裝置，等等介紹。",
                    tags: ["液態變固態", "相變放熱", "潛熱提取"]
                },
                {
                    title: "3. 智慧決策層：供暖與預測",
                    desc: "根據氣象預報模型（如明日寒流），系統提前於低電價時段啟動熱泵逆向運行，將提取的熱量高效率地分配給室內的地暖 S 型管與衛浴熱水系統。",
                    tags: ["預測模型", "熱泵逆向", "室內地暖"]
                }
            ]
        };

        // Colors
        const colors = {
            houseSum: new THREE.Color(0xbfdbfe), // Cool Blue inside
            houseWin: new THREE.Color(0xfed7aa), // Warm Orange inside
            tankSum: new THREE.Color(0xef4444),  // PCM Liquid (Hot)
            tankWin: new THREE.Color(0x3b82f6)   // PCM Solid (Cold)
        };

        let targetHouseColor = colors.houseSum.clone();
        let targetTankColor = colors.tankSum.clone();

        window.setSeason = function(season) {
            currentSeason = season;
            
            const slider = document.getElementById('toggle-slider');
            const btnSum = document.getElementById('btn-summer');
            const btnWin = document.getElementById('btn-winter');
            const navPanel = document.getElementById('nav-panel');

            if(season === 'summer') {
                slider.className = 'toggle-slider slider-summer';
                btnSum.classList.add('active-summer');
                btnWin.classList.remove('active-winter');
                navPanel.style.borderLeftColor = '#ef4444';
                
                targetHouseColor.copy(colors.houseSum);
                targetTankColor.copy(colors.tankSum);
                interiorLight.color.setHex(0x3b82f6);
                tankLight.color.setHex(0xef4444);

                particlesSummer.forEach(p => p.mesh.visible = true);
                particlesWinter.forEach(p => p.mesh.visible = false);
            } else {
                slider.className = 'toggle-slider slider-winter';
                btnSum.classList.remove('active-summer');
                btnWin.classList.add('active-winter');
                navPanel.style.borderLeftColor = '#3b82f6';

                targetHouseColor.copy(colors.houseWin);
                targetTankColor.copy(colors.tankWin);
                interiorLight.color.setHex(0xf97316);
                tankLight.color.setHex(0x3b82f6);

                particlesSummer.forEach(p => p.mesh.visible = false);
                particlesWinter.forEach(p => p.mesh.visible = true);
            }

            updateUI(currentViewIndex);
        };

        // Views
        let currentViewIndex = 0;
        let currentCamPos = new THREE.Vector3(0, 5, 26);
        let targetCamPos = new THREE.Vector3(0, 5, 26);
        let currentLookAt = new THREE.Vector3(0, 0, 0);
        let targetLookAt = new THREE.Vector3(0, 0, 0);

        const views = [
            { pos: new THREE.Vector3(0, 3, 26), look: new THREE.Vector3(0, 0, 0) }, 
            { pos: new THREE.Vector3(-14, 4, 12), look: new THREE.Vector3(-8, 2, 0) }, 
            { pos: new THREE.Vector3(-8, -2, 12), look: new THREE.Vector3(-6, -3, 0) }, 
            { pos: new THREE.Vector3(0, -4, 15), look: new THREE.Vector3(0, -4, 0) },  
            { pos: new THREE.Vector3(12, 6, 12), look: new THREE.Vector3(5, 1, 0) }    
        ];

        window.prevView = function() {
            currentViewIndex = (currentViewIndex - 1 + 5) % 5;
            updateUI(currentViewIndex);
        };

        window.nextView = function() {
            currentViewIndex = (currentViewIndex + 1) % 5;
            updateUI(currentViewIndex);
        };

        function updateUI(index) {
            currentViewIndex = index;
            targetCamPos.copy(views[index].pos);
            targetLookAt.copy(views[index].look);

            const data = textData[currentSeason][index];

            document.getElementById('current-view-name').innerText = data.title;
            
            const dots = document.getElementById('pagination-dots').children;
            const activeColor = currentSeason === 'summer' ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]' : 'bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.8)]';
            
            for(let i=0; i<5; i++) {
                dots[i].className = i === index ? `w-2 h-2 rounded-full transition-colors duration-300 ${activeColor}` : 'w-2 h-2 rounded-full bg-gray-600 transition-colors duration-300';
            }

            const panel = document.getElementById('info-panel');
            panel.classList.remove('fade-in');
            void panel.offsetWidth; 
            panel.classList.add('fade-in');

            document.getElementById('info-desc').innerText = data.desc;
            
            const tagsBox = document.getElementById('info-tags');
            tagsBox.innerHTML = '';
            const tagColor = currentSeason === 'summer' ? 'bg-red-900/40 text-red-300 border-red-600/50' : 'bg-blue-900/40 text-blue-300 border-blue-600/50';
            data.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = `px-3 py-1 border rounded-full text-sm font-medium ${tagColor}`;
                span.innerText = tag;
                tagsBox.appendChild(span);
            });
        }

        setSeason('summer');

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            currentCamPos.lerp(targetCamPos, 4 * delta);
            currentLookAt.lerp(targetLookAt, 4 * delta);
            camera.position.copy(currentCamPos);
            camera.lookAt(currentLookAt);

            materials.houseInterior.color.lerp(targetHouseColor, 2 * delta);
            materials.tankCore.emissive.lerp(targetTankColor, 2 * delta);

            const activeParticles = currentSeason === 'summer' ? particlesSummer : particlesWinter;
            activeParticles.forEach(p => {
                p.progress += p.speed;
                if(p.progress > 1) p.progress = 0;
                if(p.progress < 0) p.progress = 1;
                p.mesh.position.copy(p.curve.getPointAt(p.progress));
            });

            systemGroup.position.y = Math.sin(clock.getElapsedTime() * 0.5) * 0.1;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, false);

        window.onload = animate;
    </script>
</body>
</html>
