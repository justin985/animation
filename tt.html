<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷氣與熱泵的地熱儲存循環系統</title>
    <!-- Tailwind CSS for UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js for 3D modeling and animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Glassmorphism panel styling */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Custom Button styling */
        .nav-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.4s ease;
        }
        .nav-btn:hover::before { left: 100%; }
        .nav-btn.active { background-color: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        /* Description fade in animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <!-- Header -->
        <header class="text-center glass-panel rounded-2xl p-4 pointer-events-auto mx-auto max-w-3xl border-t-4 border-t-blue-500">
            <h1 class="text-3xl font-bold text-white tracking-wide mb-2">冷氣與熱泵的地熱儲存循環系統</h1>
            <div class="flex justify-center gap-6 text-sm font-medium text-gray-300">
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-400"></span> 夏季 (冷氣降溫)</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-orange-500"></span> 冬季 (供暖熱水)</span>
            </div>
        </header>

        <!-- Main Content Area (Buttons & Info Panel) -->
        <div class="flex justify-between items-end w-full max-w-7xl mx-auto gap-8">
            
            <!-- Navigation Buttons -->
            <div class="flex flex-col gap-3 pointer-events-auto w-64">
                <button onclick="changeView(0)" id="btn-0" class="nav-btn active text-left px-5 py-3 rounded-xl border border-gray-600 bg-gray-800 text-gray-200 font-semibold hover:bg-gray-700">
                    <span class="text-xl mr-2"></span> 0.全局視角 (Overview)
                </button>
                <button onclick="changeView(1)" id="btn-1" class="nav-btn text-left px-5 py-3 rounded-xl border border-gray-600 bg-gray-800 text-gray-200 font-semibold hover:bg-gray-700">
                    <span class="text-xl mr-2"></span> 1.集熱裝置
                </button>
                <button onclick="changeView(2)" id="btn-2" class="nav-btn text-left px-5 py-3 rounded-xl border border-gray-600 bg-gray-800 text-gray-200 font-semibold hover:bg-gray-700">
                    <span class="text-xl mr-2"></span> 2.運輸管線
                </button>
                <button onclick="changeView(3)" id="btn-3" class="nav-btn text-left px-5 py-3 rounded-xl border border-gray-600 bg-gray-800 text-gray-200 font-semibold hover:bg-gray-700">
                    <span class="text-xl mr-2"></span> 3.儲存工具
                </button>
                <button onclick="changeView(4)" id="btn-4" class="nav-btn text-left px-5 py-3 rounded-xl border border-gray-600 bg-gray-800 text-gray-200 font-semibold hover:bg-gray-700">
                    <span class="text-xl mr-2"></span> 4.放熱裝置
                </button>
            </div>

            <!-- Info Panel -->
            <div id="info-panel" class="glass-panel rounded-2xl p-6 pointer-events-auto flex-1 max-w-xl transition-all duration-300">
                <div class="flex items-center gap-3 mb-3">
                    <span id="info-icon" class="text-4xl">🌐</span>
                    <h2 id="info-title" class="text-2xl font-bold text-white">系統總覽</h2>
                </div>
                <div class="h-px w-full bg-gradient-to-r from-gray-500 to-transparent mb-4"></div>
                <p id="info-desc" class="text-gray-300 text-lg leading-relaxed">
                    這是一個跨季節的熱能調度系統。利用建築物夏季空調排出的廢熱，將其儲存於地下的相變材料或水槽中。到了冬季，熱泵再將這些儲存的熱能提取出來，用於室內地暖與衛浴熱水，達到極致的能源互補。
                </p>
                <!-- Dynamic Tags -->
                <div id="info-tags" class="mt-4 flex gap-2 flex-wrap">
                    <span class="px-3 py-1 bg-blue-900/50 text-blue-300 border border-blue-700/50 rounded-full text-sm">循環系統</span>
                    <span class="px-3 py-1 bg-emerald-900/50 text-emerald-300 border border-emerald-700/50 rounded-full text-sm">節能減碳</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Scene, Camera, Renderer Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0f172a');
        scene.fog = new THREE.FogExp2('#0f172a', 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- 2. Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        const blueLight = new THREE.PointLight(0x3b82f6, 1, 20);
        blueLight.position.set(-6, 2, 5);
        scene.add(blueLight);

        const orangeLight = new THREE.PointLight(0xf97316, 1, 20);
        orangeLight.position.set(6, 2, 5);
        scene.add(orangeLight);

        // --- 3. 3D Model Construction (Simplified Representation) ---
        const materials = {
            houseBase: new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.9 }),
            houseSummer: new THREE.MeshStandardMaterial({ color: 0xbfdbfe, roughness: 0.8 }),
            houseWinter: new THREE.MeshStandardMaterial({ color: 0xffedd5, roughness: 0.8 }),
            roof: new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.9 }),
            ground: new THREE.MeshStandardMaterial({ color: 0x271e16, transparent: true, opacity: 0.85, roughness: 1 }),
            deviceOuter: new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.3, roughness: 0.4 }),
            fan: new THREE.MeshStandardMaterial({ color: 0x1e293b }),
            pipeHot: new THREE.MeshStandardMaterial({ color: 0xef4444, metalness: 0.5, roughness: 0.2 }),
            pipeCold: new THREE.MeshStandardMaterial({ color: 0x3b82f6, metalness: 0.5, roughness: 0.2 }),
            tank: new THREE.MeshStandardMaterial({ color: 0x64748b, metalness: 0.6, roughness: 0.3 }),
            tankCore: new THREE.MeshStandardMaterial({ color: 0xf59e0b, emissive: 0x9a3412, emissiveIntensity: 0.5 })
        };

        // Group to hold everything
        const systemGroup = new THREE.Group();
        scene.add(systemGroup);

        // A. Ground (Transparent to see underground)
        const groundGeo = new THREE.BoxGeometry(30, 8, 15);
        const ground = new THREE.Mesh(groundGeo, materials.ground);
        ground.position.set(0, -4, 0);
        ground.receiveShadow = true;
        systemGroup.add(ground);

        // Grid helper for tech look
        const gridHelper = new THREE.GridHelper(30, 30, 0x3b82f6, 0x475569);
        gridHelper.position.y = 0.01;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        systemGroup.add(gridHelper);

        // B. House (Split into Summer/Winter sides)
        const houseGroup = new THREE.Group();
        
        // Left side (Summer/Cooling)
        const houseLeftGeo = new THREE.BoxGeometry(6, 6, 8);
        const houseLeft = new THREE.Mesh(houseLeftGeo, materials.houseSummer);
        houseLeft.position.set(-3, 3, 0);
        houseLeft.castShadow = true; houseLeft.receiveShadow = true;
        houseGroup.add(houseLeft);

        // Right side (Winter/Heating)
        const houseRightGeo = new THREE.BoxGeometry(6, 6, 8);
        const houseRight = new THREE.Mesh(houseRightGeo, materials.houseWinter);
        houseRight.position.set(3, 3, 0);
        houseRight.castShadow = true; houseRight.receiveShadow = true;
        houseGroup.add(houseRight);

        // Roof
        const roofGeo = new THREE.ConeGeometry(7.5, 3, 4);
        const roof = new THREE.Mesh(roofGeo, materials.roof);
        roof.position.set(0, 7.5, 0);
        roof.rotation.y = Math.PI / 4;
        roof.castShadow = true;
        houseGroup.add(roof);

        systemGroup.add(houseGroup);

        // Helper function to create an AC/Heat Pump unit
        function createHVACUnit(x, y, z) {
            const group = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(2, 2, 1.5);
            const body = new THREE.Mesh(bodyGeo, materials.deviceOuter);
            body.castShadow = true;
            
            const fanGeo = new THREE.CylinderGeometry(0.7, 0.7, 1.6, 16);
            const fan = new THREE.Mesh(fanGeo, materials.fan);
            fan.rotation.x = Math.PI / 2;
            
            group.add(body);
            group.add(fan);
            group.position.set(x, y, z);
            return group;
        }

        // C. [1. 集熱裝置] AC Unit on the left
        const acUnit = createHVACUnit(-7.5, 1, 2);
        systemGroup.add(acUnit);

        // E. [3. 儲存工具] Underground Tanks
        const tankGroup = new THREE.Group();
        const tankGeo = new THREE.CylinderGeometry(1.5, 1.5, 6, 32);
        
        // Left Tank (Summer Storage)
        const tank1 = new THREE.Mesh(tankGeo, materials.tank);
        tank1.rotation.z = Math.PI / 2;
        tank1.position.set(-4, -3.5, 2);
        tankGroup.add(tank1);
        
        // Right Tank (Winter Extraction)
        const tank2 = new THREE.Mesh(tankGeo, materials.tankCore); // Looks warm
        tank2.rotation.z = Math.PI / 2;
        tank2.position.set(4, -3.5, 2);
        tankGroup.add(tank2);

        // Connection Pipe between tanks
        const tankConnGeo = new THREE.CylinderGeometry(0.4, 0.4, 3, 16);
        const tankConn = new THREE.Mesh(tankConnGeo, materials.pipeHot);
        tankConn.rotation.z = Math.PI / 2;
        tankConn.position.set(0, -3.5, 2);
        tankGroup.add(tankConn);

        systemGroup.add(tankGroup);

        // F. [4. 放熱裝置] Heat Pump & Indoor Heating on the right
        const heatPump = createHVACUnit(7.5, 1, 2);
        systemGroup.add(heatPump);

        // Indoor Floor Heating (Squiggly pipe representation)
        const floorHeatingGroup = new THREE.Group();
        const fhMaterial = new THREE.MeshStandardMaterial({ color: 0xf97316, emissive: 0x9a3412 });
        for(let i=0; i<4; i++) {
            const fhGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
            const fh = new THREE.Mesh(fhGeo, fhMaterial);
            fh.rotation.x = Math.PI / 2;
            fh.position.set(2 + i*0.6, 0.2, 0);
            floorHeatingGroup.add(fh);
        }
        systemGroup.add(floorHeatingGroup);

        // D. [2. 運輸管線] Pipes connecting units to tanks
        function createTube(points, material) {
            const curve = new THREE.CatmullRomCurve3(points);
            const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.15, 8, false);
            const tube = new THREE.Mesh(tubeGeo, material);
            tube.castShadow = true;
            return { mesh: tube, curve: curve };
        }

        // Flow paths for particles
        const flowPaths = [];

        // Summer: AC to Underground Tank (Hot flow down)
        const p1 = [
            new THREE.Vector3(-7.5, 0, 2),
            new THREE.Vector3(-7.5, -2, 2),
            new THREE.Vector3(-6, -2, 2),
            new THREE.Vector3(-6, -3.5, 2)
        ];
        const pipe1 = createTube(p1, materials.pipeHot);
        systemGroup.add(pipe1.mesh);
        flowPaths.push({ curve: pipe1.curve, color: 0xff4444, direction: 1 }); // Downward flow

        // Summer Return (Cold flow up)
        const p2 = [
            new THREE.Vector3(-4, -2.5, 2),
            new THREE.Vector3(-4, -1, 2),
            new THREE.Vector3(-6.5, -1, 2),
            new THREE.Vector3(-6.5, 0, 2)
        ];
        const pipe2 = createTube(p2, materials.pipeCold);
        systemGroup.add(pipe2.mesh);
        flowPaths.push({ curve: pipe2.curve, color: 0x4444ff, direction: 1 });

        // Winter: Tank to Heat Pump (Warm flow up)
        const p3 = [
            new THREE.Vector3(6, -3.5, 2),
            new THREE.Vector3(6, -2, 2),
            new THREE.Vector3(7.5, -2, 2),
            new THREE.Vector3(7.5, 0, 2)
        ];
        const pipe3 = createTube(p3, materials.pipeHot);
        systemGroup.add(pipe3.mesh);
        flowPaths.push({ curve: pipe3.curve, color: 0xff8800, direction: 1 });

        // Winter Return (Cold flow down)
        const p4 = [
            new THREE.Vector3(8.5, 0, 2),
            new THREE.Vector3(8.5, -2.5, 2),
            new THREE.Vector3(5, -2.5, 2),
            new THREE.Vector3(5, -3.5, 2)
        ];
        const pipe4 = createTube(p4, materials.pipeCold);
        systemGroup.add(pipe4.mesh);

        // Floor heating connection
        const p5 = [
            new THREE.Vector3(6.5, 1, 2),
            new THREE.Vector3(6.5, 1, 0),
            new THREE.Vector3(4, 1, 0),
            new THREE.Vector3(4, 0.2, 0)
        ];
        const pipe5 = createTube(p5, materials.pipeHot);
        systemGroup.add(pipe5.mesh);

        // --- Flow Particles Animation ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.25, 8, 8);
        
        flowPaths.forEach((path) => {
            const mat = new THREE.MeshBasicMaterial({ color: path.color });
            for(let i=0; i<3; i++) {
                const mesh = new THREE.Mesh(particleGeo, mat);
                systemGroup.add(mesh);
                particles.push({
                    mesh: mesh,
                    curve: path.curve,
                    progress: i * 0.33,
                    speed: 0.005 * path.direction
                });
            }
        });

        // --- 4. Camera Animation Logic ---
        
        // Target settings for interpolation
        let currentCamPos = new THREE.Vector3(0, 5, 22);
        let targetCamPos = new THREE.Vector3(0, 5, 22);
        
        let currentLookAt = new THREE.Vector3(0, 0, 0);
        let targetLookAt = new THREE.Vector3(0, 0, 0);

        camera.position.copy(currentCamPos);
        camera.lookAt(currentLookAt);

        // View definitions based on the 4 steps
        const views = [
            { // 0: Overview
                pos: new THREE.Vector3(0, 5, 22), 
                look: new THREE.Vector3(0, 0, 0) 
            },
            { // 1: 集熱裝置 (Left side AC)
                pos: new THREE.Vector3(-12, 3, 8), 
                look: new THREE.Vector3(-7, 1, 0) 
            },
            { // 2: 運輸管線 (Pipes going down)
                pos: new THREE.Vector3(-6, -1, 10), 
                look: new THREE.Vector3(-5, -2, 2) 
            },
            { // 3: 儲存工具 (Underground Tanks)
                pos: new THREE.Vector3(0, -4, 12), 
                look: new THREE.Vector3(0, -3.5, 2) 
            },
            { // 4: 放熱裝置 (Right side Heat Pump & floor)
                pos: new THREE.Vector3(12, 3, 8), 
                look: new THREE.Vector3(6, 1, 0) 
            }
        ];

        // --- 5. UI Data & Interaction ---
        const contentData = [
            {
                title: "系統總覽", icon: "🌐",
                desc: "這是一個跨季節的熱能調度系統。利用建築物夏季空調排出的廢熱，將其儲存於地下的相變材料或水槽中。到了冬季，熱泵再將這些儲存的熱能提取出來，用於室內地暖與衛浴熱水，達到極致的能源互補。",
                tags: ["循環系統", "節能減碳", "冷熱調適"]
            },
            {
                title: "1. 集熱裝置", icon: "☀️",
                desc: "在夏季冷氣運行模式下，室內的熱量被冷媒帶走。傳統空調會將這些廢熱直接排向街道造成熱島效應，但此系統透過集熱裝置，將高溫冷媒排出的熱量進行攔截與回收。",
                tags: ["廢熱回收", "冷氣降溫", "熱交換"]
            },
            {
                title: "2. 運輸管線", icon: "🛤️",
                desc: "攔截下來的熱量，透過佈建於牆體或土壤層中的循環水系統（或冷媒管線）向下運輸。管線具備良好的保溫層，確保熱能在傳輸過程中不會散失，精準送達地底。",
                tags: ["循環水系統", "土壤層", "低損耗傳輸"]
            },
            {
                title: "3. 儲存工具", icon: "🔋",
                desc: "地底設有專門的「熱能儲存槽」（可為水槽或填充相變材料）。夏季源源不絕的廢熱在此轉化為潛熱儲存起來。利用地底恆溫的特性，這座天然的保溫瓶能將熱能保存數月之久。",
                tags: ["地熱儲存", "相變材料 (PCM)", "跨季節儲能"]
            },
            {
                title: "4. 放熱裝置", icon: "❄️",
                desc: "冬季寒流來襲時，室外熱泵逆向運行。它不再消耗大量電力製熱，而是直接從地底儲存槽提取「夏季存下來的熱量」，將其升溫後供應給室內的地暖系統與衛浴熱水器。",
                tags: ["熱泵逆向", "室內地暖", "衛浴熱水"]
            }
        ];

        // Expose function to global scope for HTML buttons
        window.changeView = function(index) {
            // Update Camera Targets
            targetCamPos.copy(views[index].pos);
            targetLookAt.copy(views[index].look);

            // Update UI Button states
            for(let i=0; i<=4; i++) {
                document.getElementById(`btn-${i}`).classList.remove('active');
            }
            document.getElementById(`btn-${index}`).classList.add('active');

            // Update Info Panel DOM
            const panel = document.getElementById('info-panel');
            const title = document.getElementById('info-title');
            const desc = document.getElementById('info-desc');
            const icon = document.getElementById('info-icon');
            const tagsBox = document.getElementById('info-tags');

            // Trigger animation re-flow
            panel.classList.remove('fade-in');
            void panel.offsetWidth; // trigger reflow
            panel.classList.add('fade-in');

            const data = contentData[index];
            icon.innerText = data.icon;
            title.innerText = data.title;
            desc.innerText = data.desc;
            
            // Rebuild tags
            tagsBox.innerHTML = '';
            data.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'px-3 py-1 bg-blue-900/40 text-blue-300 border border-blue-600/50 rounded-full text-sm font-medium';
                span.innerText = tag;
                tagsBox.appendChild(span);
            });
        };

        // --- 6. Main Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Smooth Camera Interpolation (Lerp)
            currentCamPos.lerp(targetCamPos, 4 * delta);
            currentLookAt.lerp(targetLookAt, 4 * delta);
            
            camera.position.copy(currentCamPos);
            camera.lookAt(currentLookAt);

            // Animate Flow Particles
            particles.forEach(p => {
                p.progress += p.speed;
                if(p.progress > 1) p.progress = 0;
                if(p.progress < 0) p.progress = 1;
                
                // Get point on curve
                const point = p.curve.getPointAt(p.progress);
                p.mesh.position.copy(point);
            });

            // Gentle floating effect for the entire system to make it feel alive
            const time = clock.getElapsedTime();
            systemGroup.position.y = Math.sin(time * 0.5) * 0.1;

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Start animation loop once window loads
        window.onload = function() {
            animate();
        };

    </script>
</body>
</html>
